<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AgroSystem Pro - Análise Multiespectral</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- PDF libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing:border-box; margin:0; padding:0 }
  
  html, body { 
    height: 100%; 
    width: 100%;
    overflow: hidden; 
    font-family:'Segoe UI', sans-serif; 
    background:#0d1117; 
    color:#e0e0e0; 
  }

  body { display: flex; flex-direction: column; }

  /* HEADER */
  #header {
    background:linear-gradient(135deg,#1b4332,#2d6a4f);
    padding:10px 16px; display:flex; align-items:center;
    gap:10px; box-shadow:0 2px 8px rgba(0,0,0,.5);
    flex-shrink: 0;
  }
  #header h1 { font-size:15px; font-weight:700; color:#fff }
  #header small { font-size:10px; color:#b7e4c7; display:block }
  #source-badge {
    margin-left:auto; background:#0d3b26; border:1px solid #2d6a4f;
    border-radius:8px; padding:4px 10px; font-size:10px; color:#74c69d
  }

  /* MAPA */
  #map { flex: 1; width: 100%; z-index: 1; background:#111; }

  /* PAINEL */
  .panel {
    background:#161b22; 
    padding:12px;
    display:flex; 
    flex-direction:column; 
    gap:8px;
    border-top: 1px solid #30363d;
    flex-shrink: 0;
    padding-bottom: env(safe-area-inset-bottom, 12px);
  }

  .row { 
    display:flex; 
    gap:8px; 
    align-items:center; 
    width: 100%;
  }

  select, input[type=date], input[type=range] {
    flex: 1;
    min-width: 0;
    padding: 9px 12px; 
    border-radius:10px;
    border:1px solid #30363d; 
    background:#0d1117;
    color:#e0e0e0; 
    font-size:13px; 
    outline:none;
    height: 42px;
    accent-color: #2d6a4f;
  }
  select:focus, input:focus { border-color:#2d6a4f }

  button {
    flex: 1;
    height: 42px;
    border:none;
    border-radius:10px; 
    color:#fff; 
    font-weight:700;
    font-size:13px; 
    cursor:pointer; 
    transition:.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
    gap:5px;
  }

  button:active { transform:scale(.97); filter: brightness(1.2); }
  button:disabled { opacity:.45; cursor:wait }

  .btn-today  { background:#4a148c; flex: 0 0 auto; padding: 0 15px; font-size: 11px; }
  .btn-gps    { background:#1565c0; }
  .btn-update { background:#1b5e20; }
  .btn-pdf    { background:#b33e1f; flex: 0.7; background:#bf360c; }

  /* LEGENDA */
  #legend {
    position:absolute; bottom:195px; right:10px;
    background:#161b22ee; border:1px solid #30363d;
    border-radius:12px; padding:10px 13px;
    font-size:11px; z-index:1000; min-width:155px;
    backdrop-filter: blur(4px);
    pointer-events: none;
  }
  #legend h4 { color:#95d5b2; margin-bottom:7px; font-size:12px }
  .li { display:flex; align-items:center; gap:7px; margin:3px 0 }
  .lc { width:20px; height:11px; border-radius:3px; flex-shrink:0 }

  /* TOAST */
  #toast {
    position:fixed; top:58px; left:50%;
    transform:translateX(-50%);
    background:#0d1117ee; color:#95d5b2;
    padding:6px 18px; border-radius:20px;
    font-size:12px; z-index:2000;
    border:1px solid #2d6a4f;
    opacity:0; transition:opacity .3s;
    pointer-events:none; white-space:nowrap
  }

  /* GPS PULSANTE */
  .pulse-ring {
    border:3px solid #1976d2;
    border-radius:50%; height:30px; width:30px;
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    animation:pulse 1.5s ease-out infinite
  }
  @keyframes pulse {
    0%   { transform:translate(-50%,-50%) scale(.5); opacity:1 }
    100% { transform:translate(-50%,-50%) scale(2.2); opacity:0 }
  }
  .pulse-dot {
    background:#1976d2; border:3px solid #fff;
    border-radius:50%; height:14px; width:14px;
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 8px rgba(25,118,210,.8)
  }

  #res-info {
    position:absolute; top:58px; left:10px;
    background:#0d1117cc; border:1px solid #30363d;
    border-radius:8px; padding:4px 10px;
    font-size:10px; color:#74c69d; z-index:1000;
    backdrop-filter: blur(4px);
  }

  .opacity-label {
    font-size: 11px;
    min-width: 65px;
    color: #8b949e;
  }
</style>
</head>
<body>

<div id="header">
  <span style="font-size:24px">🌾</span>
  <div>
    <h1>AgroSystem Pro</h1>
    <small>Monitoramento por Satélite | NDVI · NDMI · NDWI · Precipitação</small>
  </div>
  <div id="source-badge">🛰️ NASA GIBS · EOSDIS</div>
</div>

<div id="map"></div>
<div id="legend"></div>
<div id="res-info"></div>
<div id="toast"></div>

<div class="panel">
  <div class="row">
    <select id="layer">
      <option value="NDVI">🌱 NDVI — Saúde da Vegetação</option>
      <option value="NDMI">💧 NDMI — Índice de Umidade (Estresse Hídrico)</option>
      <option value="NDWI">🌊 NDWI — Índice de Água Superficial</option>
      <option value="PRECIP">☔ Precipitação (GPM) — Chuva Diária</option>
      <option value="BURNED">🔥 Áreas Queimadas MODIS</option>
      <option value="SOIL-MOISTURE">🟫 Umidade do Solo (SMAP)</option>
      <option value="TRUE-COLOR">🖼️ RGB — Cor Real (VIIRS)</option>
      <option value="FALSE-COLOR">🔴 Falsa Cor — Infravermelho</option>
      <option value="LAND-TEMP">🌡️ Temperatura Superficial</option>
    </select>
    <button class="btn-today" onclick="setToday()">📅 Hoje</button>
  </div>
  <div class="row">
    <input type="date" id="date">
    <button class="btn-gps" onclick="goToMyLocation()">📍 Localização</button>
    <button class="btn-update" id="btnUpdate" onclick="updateLayer()">🛰️ Carregar</button>
  </div>
  <div class="row">
    <span class="opacity-label">Opacidade:</span>
    <input type="range" id="opacity" min="10" max="100" value="75" step="5">
    <button class="btn-pdf" id="btnPDF" onclick="generatePDFReport()">📄 Relatório PDF</button>
  </div>
</div>

<script>
// --------------------------------------------------------------
// VERSÃO 1.1 ATUALIZADA
// Dados oficiais NASA GIBS, produtos corrigidos
// --------------------------------------------------------------
const GIBS = {
  'NDVI': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_NDVI_8Day/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.png`,
    maxZ: 7, defaultOpacity: 0.75,
    res: 'MODIS Terra · 250 m · NDVI composição 8 dias',
    legend: { title: 'NDVI – Vegetação', items: [
      {c:'#005a00', l:'Floresta densa (>0.8)'},{c:'#1a9641', l:'Vegetação saudável'},
      {c:'#a6d96a', l:'Vegetação moderada'},{c:'#ffffbf', l:'Vegetação escassa'},
      {c:'#d7191c', l:'Solo / sem vegetação'}
    ]},
    snap8Day: true
  },
  'NDMI': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_NDMI_8Day/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.png`,
    maxZ: 7, defaultOpacity: 0.75,
    res: 'MODIS Terra · 500 m · NDMI (umidade do dossel) 8d',
    legend: { title: 'NDMI – Umidade da Vegetação', items: [
      {c:'#084081', l:'Alta umidade / floresta'},{c:'#2c7bb6', l:'Vegetação úmida'},
      {c:'#abd9e9', l:'Umidade moderada'},{c:'#fdae61', l:'Estresse hídrico leve'},
      {c:'#d7191c', l:'Severo estresse / seco'}
    ]},
    snap8Day: true
  },
  'NDWI': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_NDWI_8Day/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.png`,
    maxZ: 7, defaultOpacity: 0.75,
    res: 'MODIS Terra · 500 m · NDWI (água superficial) 8d',
    legend: { title: 'NDWI – Corpos d\'água', items: [
      {c:'#023858', l:'Água profunda / alta umidade'},{c:'#0570b0', l:'Água / reservatórios'},
      {c:'#74a9cf', l:'Umidade no solo'},{c:'#e0e0e0', l:'Solo seco / vegetação'},
      {c:'#b2182b', l:'Solo exposto / queimadas'}
    ]},
    snap8Day: true
  },
  'PRECIP': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/GPM_3IMERGHH_L3_RainRate/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.png`,
    maxZ: 6, defaultOpacity: 0.65,
    res: 'GPM IMERG · 10km · Precipitação diária (mm/h)',
    legend: { title: 'Precipitação (mm/h)', items: [
      {c:'#ffffcc', l:'< 0.5 mm (seco)'},{c:'#a1dab4', l:'0.5 - 2 mm'},
      {c:'#41b6c4', l:'2 - 5 mm'},{c:'#2c7fb8', l:'5 - 10 mm'},
      {c:'#253494', l:'> 10 mm (chuva intensa)'}
    ]},
    snap8Day: false
  },
  'BURNED': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_BurnedArea/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.png`,
    maxZ: 7, defaultOpacity: 0.7,
    res: 'MODIS Terra · 500m · Áreas queimadas',
    legend: { title: 'Áreas Queimadas', items: [
      {c:'#700000', l:'Queimada recente'},{c:'#aa3300', l:'Menos de 30 dias'},
      {c:'#ffaa00', l:'30-90 dias'},{c:'#777777', l:'Não queimado'}
    ]},
    snap8Day: true
  },
  'SOIL-MOISTURE': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/SMAP_L3_Passive_Soil_Moisture/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.png`,
    maxZ: 6, defaultOpacity: 0.7,
    res: 'SMAP · 36 km · Umidade do solo (volumétrica) diário',
    legend: { title: 'Umidade do Solo (Estresse Hídrico)', items: [
      {c:'#a50026', l:'Muito seco (<0.1 m³/m³)'},{c:'#d73027', l:'Seco'},
      {c:'#f46d43', l:'Moderado'},{c:'#fdae61', l:'Úmido'},
      {c:'#66c2a5', l:'Alta umidade (>0.3)'}
    ]},
    snap8Day: false
  },
  'TRUE-COLOR': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_SNPP_CorrectedReflectance_TrueColor/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.jpg`,
    maxZ: 8, defaultOpacity: 0.9,
    res: 'VIIRS SNPP · 375 m · cor real diária',
    legend: { title: 'RGB – Cor Real', items: [
      {c:'#226622', l:'Vegetação'},{c:'#c8b400', l:'Área agrícola'},
      {c:'#d2b48c', l:'Solo exposto'},{c:'#4169e1', l:'Água'},{c:'#ffffff', l:'Nuvens'}
    ]},
    snap8Day: false
  },
  'FALSE-COLOR': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_CorrectedReflectance_Bands721/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.jpg`,
    maxZ: 8, defaultOpacity: 0.8,
    res: 'MODIS Terra · 500 m · NIR Bandas 7-2-1',
    legend: { title: 'Falsa Cor NIR', items: [
      {c:'#cc0000', l:'Vegetação ativa'},{c:'#ff9999', l:'Vegetação jovem'},
      {c:'#ffa500', l:'Área queimada'},{c:'#555555', l:'Solo / Urbano'},{c:'#003399', l:'Água'}
    ]},
    snap8Day: false
  },
  'LAND-TEMP': {
    tpl: d => `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_Land_Surface_Temp_Day/default/${d}/GoogleMapsCompatible/{z}/{y}/{x}.png`,
    maxZ: 7, defaultOpacity: 0.65,
    res: 'MODIS Terra · 1 km · temp. superficial diurna',
    legend: { title: 'Temperatura (°C)', items: [
      {c:'#67001f', l:'> 45°C'},{c:'#d6604d', l:'35–45°C'},{c:'#fddbc7', l:'25–35°C'},
      {c:'#4393c3', l:'15–25°C'},{c:'#053061', l:'<15°C'}
    ]},
    snap8Day: false
  }
};

const map = L.map('map', { zoomControl: true }).setView([-15.8, -47.9], 5);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution:'© Esri · NASA', maxZoom:19
}).addTo(map);

let currentLayer = null;
let isLoading = false;
let locationMarker = null;
let locationCircle = null;

// Controle de opacidade
document.getElementById('opacity').addEventListener('input', e => {
  if(currentLayer) currentLayer.setOpacity(e.target.value / 100);
});

// Helper functions
function toast(msg, dur = 3500) {
  const el = document.getElementById('toast');
  el.innerText = msg; el.style.opacity = 1;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = 0, dur);
}

function setLoading(v) {
  isLoading = v;
  const b = document.getElementById('btnUpdate');
  b.disabled = v;
  b.textContent = v ? '⏳ Carregando...' : '🛰️ Carregar';
}

function setToday() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  document.getElementById('date').value = d.toISOString().split('T')[0];
  toast('📅 Data definida para ontem');
}

// Snap para composições MODIS 8 dias - alinhado ciclo oficial NASA
function snapToModis8Day(dateStr) {
  const epoch = new Date('1999-12-31');
  const target = new Date(dateStr);
  const diff = Math.floor((target - epoch) / 86400000);
  const snapped = new Date(epoch);
  snapped.setDate(snapped.getDate() + Math.floor(diff / 8) * 8);
  return snapped.toISOString().split('T')[0];
}

function updateLegend(type) {
  const leg = GIBS[type]?.legend;
  const el = document.getElementById('legend');
  if (leg) {
    el.innerHTML = `<h4>📊 ${leg.title}</h4>` + leg.items.map(i => `<div class="li"><div class="lc" style="background:${i.c}"></div><span>${i.l}</span></div>`).join('');
  } else {
    el.innerHTML = `<h4>Legenda</h4>`;
  }
}

function onLayerChange() {
  const type = document.getElementById('layer').value;
  updateLegend(type);
  const res = GIBS[type]?.res || 'Resolução variável';
  document.getElementById('res-info').style.display = 'block';
  document.getElementById('res-info').innerHTML = `📡 ${res}`;
  document.getElementById('opacity').value = GIBS[type].defaultOpacity * 100;
}

function updateLayer() {
  if (isLoading) return;
  const type = document.getElementById('layer').value;
  let dateVal = document.getElementById('date').value;
  if (!dateVal) { toast('⚠️ Selecione uma data'); return; }
  
  const layerDef = GIBS[type];

  // Aplica snap para produtos MODIS 8 dias
  let usedDate = dateVal;
  if (layerDef.snap8Day) {
    usedDate = snapToModis8Day(dateVal);
    toast(`🔄 Produto MODIS 8d: data ajustada para ${usedDate}`);
  }
  
  const url = layerDef.tpl(usedDate);
  if (currentLayer) map.removeLayer(currentLayer);
  setLoading(true);
  
  currentLayer = L.tileLayer(url, { 
    maxZoom: 19,
    maxNativeZoom: layerDef.maxZ, 
    opacity: document.getElementById('opacity').value / 100,
    errorTileUrl: '',
    crossOrigin: 'anonymous'
  }).addTo(map);

  map.on('zoom', () => {
    if(map.getZoom() > layerDef.maxZ) {
      document.getElementById('res-info').style.color = '#f85149';
    } else {
      document.getElementById('res-info').style.color = '#74c69d';
    }
  });
  
  currentLayer.on('load', () => { 
    setLoading(false); 
    toast(`✅ ${type} carregado (${usedDate})`);
  });

  setTimeout(() => { 
    if (isLoading) { setLoading(false); toast('⚠️ Dados indisponíveis para esta data.'); } 
  }, 18000);
}

function goToMyLocation() {
  if (!navigator.geolocation) return toast('❌ GPS não suportado');
  toast('📍 Obtendo localização...');
  navigator.geolocation.getCurrentPosition((pos) => {
    const lat = pos.coords.latitude, lng = pos.coords.longitude, acc = Math.round(pos.coords.accuracy);
    if (locationMarker) map.removeLayer(locationMarker);
    if (locationCircle) map.removeLayer(locationCircle);
    locationCircle = L.circle([lat, lng], { radius: acc, color: '#1976d2', fillOpacity: 0.1 }).addTo(map);
    const pulseIcon = L.divIcon({
      className: '', iconSize: [30, 30], iconAnchor: [15, 15],
      html: `<div style="position:relative;width:30px;height:30px"><div class="pulse-ring"></div><div class="pulse-dot"></div></div>`
    });
    locationMarker = L.marker([lat, lng], { icon: pulseIcon }).addTo(map).bindPopup("📍 Você está aqui").openPopup();
    map.flyTo([lat, lng], 11);
    toast('✅ Localização centralizada');
  }, (err) => toast('❌ Erro GPS: permissão negada'), { enableHighAccuracy: true });
}

// -------------------- GERAR RELATÓRIO PDF --------------------
async function generatePDFReport() {
  const { jsPDF } = window.jspdf;
  const mapElement = document.getElementById('map');
  const activeLayerType = document.getElementById('layer').value;
  const activeLayerName = document.querySelector(`#layer option[value="${activeLayerType}"]`)?.innerText || activeLayerType;
  const selectedDate = document.getElementById('date').value || 'não definida';
  const center = map.getCenter();
  const zoom = map.getZoom();
  const bounds = map.getBounds();
  const latCenter = center.lat.toFixed(5);
  const lngCenter = center.lng.toFixed(5);
  const resText = GIBS[activeLayerType]?.res || 'Dados satelitais';
  const legendInfo = GIBS[activeLayerType]?.legend?.title || 'Legenda específica';
  
  toast('📄 Gerando relatório, aguarde...', 2000);
  
  try {
    const canvas = await html2canvas(mapElement, {
      scale: 2,
      backgroundColor: '#111',
      useCORS: true,
      allowTaint: true,
      logging: false
    });
    const imgData = canvas.toDataURL('image/png');
    
    const pdf = new jsPDF('landscape', 'mm', 'a4');
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    
    // Cabeçalho
    pdf.setFillColor(27, 67, 50);
    pdf.rect(0, 0, pageWidth, 30, 'F');
    pdf.setTextColor(255, 255, 255);
    pdf.setFontSize(20);
    pdf.text("AgroSystem Pro - Relatório de Monitoramento", 15, 18);
    pdf.setFontSize(10);
    pdf.text("Dados NASA GIBS • EOSDIS", pageWidth - 45, 12);
    
    // Metadados
    pdf.setTextColor(0, 0, 0);
    pdf.setFontSize(11);
    let y = 38;
    pdf.text(`📌 Camada Ativa: ${activeLayerName}`, 15, y); y += 7;
    pdf.text(`📅 Data da Imagem: ${selectedDate}`, 15, y); y += 7;
    pdf.text(`📍 Centro do Mapa: ${latCenter}°, ${lngCenter}° | Zoom: ${zoom}`, 15, y); y += 7;
    pdf.text(`🛰️ Resolução: ${resText}`, 15, y); y += 9;
    
    // Análise resumida dinâmica
    pdf.setFontSize(10);
    let analysisText = "";
    if (activeLayerType === "NDVI") analysisText = "NDVI alto indica vegetação vigorosa; áreas em vermelho/marrom sugerem solo exposto ou estresse.";
    else if (activeLayerType === "NDMI") analysisText = "NDMI reflete umidade na vegetação. Valores baixos indicam estresse hídrico severo; ideais para planejamento de irrigação.";
    else if (activeLayerType === "NDWI") analysisText = "NDWI destaca corpos d’água e umidade do solo. Essencial para gestão de reservatórios e monitoramento de enchentes.";
    else if (activeLayerType === "PRECIP") analysisText = "Precipitação estimada pelo GPM. Monitora chuvas recentes para planejamento agrícola.";
    else if (activeLayerType === "SOIL-MOISTURE") analysisText = "Umidade do solo (SMAP). Regiões secas indicam necessidade de irrigação ou alerta de estresse hídrico.";
    else if (activeLayerType === "LAND-TEMP") analysisText = "Temperatura superficial auxilia no monitoramento de evapotranspiração e stress térmico das culturas.";
    else analysisText = "Análise visual baseada na refletância espectral; consulte especialista para decisões críticas.";
    
    pdf.text(`📋 Interpretação: ${analysisText}`, 15, y, { maxWidth: pageWidth - 30 });
    y += 12;
    
    // Imagem do mapa
    const imgWidth = pageWidth - 30;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    pdf.addImage(imgData, 'PNG', 15, y, imgWidth, imgHeight);
    
    // Rodapé
    const footerY = y + imgHeight + 5;
    pdf.setFontSize(8);
    pdf.setTextColor(100);
    pdf.text(`Relatório gerado em ${new Date().toLocaleString('pt-BR')} · Dados sujeitos a disponibilidade NASA`, 15, footerY);
    
    pdf.save(`relatorio_agro_${activeLayerType}_${selectedDate}.pdf`);
    toast('✅ PDF gerado com sucesso!');
  } catch (err) {
    console.error(err);
    toast('❌ Erro ao gerar PDF: ' + err.message);
  }
}

// Vincula eventos
document.getElementById('layer').addEventListener('change', onLayerChange);

// Inicialização
(function init() {
  const d = new Date(); d.setDate(d.getDate() - 2);
  const iso = d.toISOString().split('T')[0];
  document.getElementById('date').value = iso;
  onLayerChange();
  setTimeout(() => updateLayer(), 500);
})();
</script>
</body>
</html>
